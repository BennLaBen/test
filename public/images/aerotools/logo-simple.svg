<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 68" width="400" height="68">
  <defs>
    <!-- Metallic Blue Gradient -->
    <linearGradient id="metal-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4B91F7"/>
      <stop offset="40%" stop-color="#1A56B3"/>
      <stop offset="50%" stop-color="#0F3981"/>
      <stop offset="60%" stop-color="#1A56B3"/>
      <stop offset="100%" stop-color="#4B91F7"/>
    </linearGradient>
    
    <!-- Metallic Red Gradient -->
    <linearGradient id="metal-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF4D4D"/>
      <stop offset="40%" stop-color="#D11A1A"/>
      <stop offset="50%" stop-color="#8B0000"/>
      <stop offset="60%" stop-color="#D11A1A"/>
      <stop offset="100%" stop-color="#FF4D4D"/>
    </linearGradient>

    <!-- Silver/Chrome Edge -->
    <linearGradient id="silver-edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#BCC6D5"/>
      <stop offset="50%" stop-color="#F8FAFC"/>
      <stop offset="80%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- LLEDO EMBLEM (Faithful Brand Form) -->
  <g transform="translate(15, 10)">
    <!-- Outer Blue "C" Shape (Slanted) -->
    <path d="M12,0 L95,0 L104,12 L104,20 L80,20 L76,12 L24,12 L30,28 L76,28 L80,36 L84,44 L0,44 L-8,32 L-8,12 Z" 
          fill="url(#metal-blue)" stroke="url(#silver-edge)" stroke-width="1.2"/>
    
    <!-- Inner Red Part (Slanted) -->
    <path d="M35,16 L88,16 L92,24 L92,30 L88,38 L32,38 L28,30 L28,24 Z" 
          fill="url(#metal-red)" stroke="url(#silver-edge)" stroke-width="1"/>
    
    <!-- Highlights -->
    <path d="M15,3 L92,3" stroke="white" stroke-width="0.5" opacity="0.4"/>
    <path d="M38,19 L85,19" stroke="white" stroke-width="0.4" opacity="0.3"/>
  </g>

  <!-- TEXT SECTION -->
  <g transform="translate(130, 14)">
    <!-- LLEDO Main Title -->
    <text x="0" y="24" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="30" fill="url(#metal-blue)" letter-spacing="1">LLEDO</text>
    <text x="0" y="24" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="30" fill="none" stroke="url(#silver-edge)" stroke-width="0.4" letter-spacing="1">LLEDO</text>
    
    <!-- Subtitle -->
    <g transform="translate(0, 32)">
      <rect x="0" y="0" width="240" height="15" rx="2" fill="#0B1220" opacity="0.85"/>
      <text x="5" y="11.5" font-family="Arial, sans-serif" font-weight="800" font-size="11.5" fill="#A9D4FF" letter-spacing="3">AERO DISTRIBUTION</text>
      <line x1="0" y1="0" x2="220" y2="0" stroke="#3B82F6" stroke-width="2" opacity="0.9"/>
    </g>
  </g>

  <!-- Integrated Helicopter Silhouette (Aero Context) -->
  <g transform="translate(365, 12) scale(0.32)">
     <path d="M15,28 Q20,20 30,18 L50,16 Q60,15 70,17 L85,22 Q95,26 98,32 L100,36 Q102,40 98,42 L80,44 Q70,45 60,44 L40,42 Q30,41 22,42 L18,43 Q14,44 13,40 Z" fill="url(#metal-blue)" stroke="url(#silver-edge)" stroke-width="2"/>
     <path d="M15,28 L2,30 Q0,31 0,34 L1,37 Q2,39 5,38 L15,35" fill="url(#metal-red)" stroke="url(#silver-edge)" stroke-width="1.5"/>
  </g>
</svg>
