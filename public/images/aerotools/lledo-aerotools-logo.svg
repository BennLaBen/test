<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 90" width="520" height="90">
  <defs>
    <!-- Metallic blue gradient (matching LLEDO Industries charter) -->
    <linearGradient id="metal-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6BB3F8"/>
      <stop offset="25%" stop-color="#2E7AD1"/>
      <stop offset="50%" stop-color="#1E5FAA"/>
      <stop offset="75%" stop-color="#2E7AD1"/>
      <stop offset="100%" stop-color="#6BB3F8"/>
    </linearGradient>
    <!-- Cyan accent gradient -->
    <linearGradient id="metal-cyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <!-- Silver edge highlight -->
    <linearGradient id="silver-edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="50%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <!-- Glow filter for helicopter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- LLEDO text with metallic effect -->
  <g filter="url(#shadow)">
    <text x="10" y="50" font-family="'Arial Black', 'Segoe UI Black', sans-serif" font-weight="900" font-size="42" 
          fill="url(#metal-blue)" letter-spacing="3">LLEDO</text>
    <text x="10" y="50" font-family="'Arial Black', 'Segoe UI Black', sans-serif" font-weight="900" font-size="42" 
          fill="none" stroke="url(#silver-edge)" stroke-width="0.8" letter-spacing="3">LLEDO</text>
  </g>

  <!-- AERO DISTRIBUTION subtitle -->
  <text x="10" y="75" font-family="'Arial', 'Segoe UI', sans-serif" font-weight="700" font-size="18" 
        fill="#4A90D9" letter-spacing="8">AERO DISTRIBUTION</text>

  <!-- Decorative line under LLEDO -->
  <line x1="10" y1="56" x2="200" y2="56" stroke="url(#metal-cyan)" stroke-width="2" opacity="0.5"/>

  <!-- Helicopter icon (stylized, modern) -->
  <g transform="translate(360, 15)" filter="url(#glow)">
    <!-- Main fuselage -->
    <path d="M20,35 Q25,28 35,26 L55,24 Q65,23 75,25 L95,30 Q105,33 110,38 L115,43 Q118,47 115,50 L95,52 Q85,53 75,52 L55,50 Q45,49 35,50 L25,51 Q20,52 18,48 Z" 
          fill="url(#metal-blue)" stroke="url(#silver-edge)" stroke-width="1.2" opacity="0.95"/>
    
    <!-- Tail boom -->
    <path d="M20,35 L5,38 Q2,39 2,42 L3,45 Q4,47 7,46 L20,43" 
          fill="url(#metal-blue)" stroke="url(#silver-edge)" stroke-width="0.8" opacity="0.9"/>
    
    <!-- Tail rotor -->
    <circle cx="3" cy="42" r="4" fill="none" stroke="url(#metal-cyan)" stroke-width="1" opacity="0.6"/>
    <line x1="1" y1="42" x2="5" y2="42" stroke="url(#metal-cyan)" stroke-width="0.8" opacity="0.7"/>
    
    <!-- Main rotor mast -->
    <line x1="65" y1="24" x2="65" y2="10" stroke="url(#silver-edge)" stroke-width="2" opacity="0.8"/>
    
    <!-- Main rotor disc (spinning effect) -->
    <ellipse cx="65" cy="10" rx="55" ry="3" fill="url(#metal-cyan)" opacity="0.25"/>
    <line x1="10" y1="10" x2="120" y2="10" stroke="url(#metal-cyan)" stroke-width="1.5" opacity="0.4"/>
    <line x1="65" y1="7" x2="65" y2="13" stroke="url(#metal-cyan)" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Cockpit windows -->
    <rect x="45" y="30" width="18" height="12" rx="3" fill="#60A5FA" opacity="0.35"/>
    <rect x="68" y="29" width="18" height="13" rx="3" fill="#60A5FA" opacity="0.35"/>
    
    <!-- Landing skids -->
    <path d="M30,50 Q32,54 35,55 L95,55 Q98,54 100,50" 
          fill="none" stroke="url(#silver-edge)" stroke-width="2.5" opacity="0.7"/>
    <line x1="40" y1="48" x2="38" y2="55" stroke="url(#silver-edge)" stroke-width="1.5" opacity="0.6"/>
    <line x1="90" y1="48" x2="92" y2="55" stroke="url(#silver-edge)" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Highlight shine on fuselage -->
    <path d="M35,26 Q45,24 55,24 L75,25 Q85,26 95,30" 
          fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.25"/>
  </g>

  <!-- Small accent dot -->
  <circle cx="205" cy="72" r="2" fill="url(#metal-cyan)" opacity="0.6"/>
</svg>
