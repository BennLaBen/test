<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <!-- Metallic blue gradient (like LLEDO Industries logo) -->
    <linearGradient id="metal-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5BA3E8"/>
      <stop offset="25%" stop-color="#1E5FAA"/>
      <stop offset="50%" stop-color="#0D3A6E"/>
      <stop offset="75%" stop-color="#1E5FAA"/>
      <stop offset="100%" stop-color="#5BA3E8"/>
    </linearGradient>
    <!-- Red accent gradient -->
    <linearGradient id="metal-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E85B5B"/>
      <stop offset="25%" stop-color="#C41E1E"/>
      <stop offset="50%" stop-color="#8B0000"/>
      <stop offset="75%" stop-color="#C41E1E"/>
      <stop offset="100%" stop-color="#E85B5B"/>
    </linearGradient>
    <!-- Silver edge highlight -->
    <linearGradient id="silver-edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="50%" stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="text-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6BB3F8"/>
      <stop offset="50%" stop-color="#2E7AD1"/>
      <stop offset="100%" stop-color="#6BB3F8"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Icon: Stylized L with red center (matching LLEDO Industries style) -->
  <g transform="translate(5, 8)" filter="url(#shadow)">
    <!-- Outer blue L shape -->
    <path d="M0,0 L45,0 L45,15 L15,15 L15,60 L45,60 L45,45 L30,45 L30,30 L45,30 L45,60 L0,60 Z" 
          fill="url(#metal-blue)" stroke="url(#silver-edge)" stroke-width="1"/>
    <!-- Inner red accent -->
    <path d="M18,18 L27,18 L27,42 L42,42 L42,57 L18,57 Z" 
          fill="url(#metal-red)" stroke="url(#silver-edge)" stroke-width="0.5"/>
  </g>

  <!-- LLEO text with metallic effect -->
  <g filter="url(#shadow)">
    <text x="70" y="45" font-family="'Arial Black', 'Segoe UI Black', sans-serif" font-weight="900" font-size="38" 
          fill="url(#text-blue)" letter-spacing="2">LLEO</text>
    <text x="70" y="45" font-family="'Arial Black', 'Segoe UI Black', sans-serif" font-weight="900" font-size="38" 
          fill="none" stroke="url(#silver-edge)" stroke-width="0.5" letter-spacing="2">LLEO</text>
  </g>

  <!-- AEROTOOLS subtitle -->
  <text x="70" y="68" font-family="'Arial', 'Segoe UI', sans-serif" font-weight="700" font-size="16" 
        fill="#4A90D9" letter-spacing="6">AEROTOOLS</text>

  <!-- Decorative line -->
  <line x1="70" y1="50" x2="180" y2="50" stroke="#4A90D9" stroke-width="1.5" opacity="0.6"/>
</svg>
